{% load static %}

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Test BabylonJS</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
        }
    </style>
    <!-- Carica BabylonJS dai static della tua app -->
    <script src="{% static 'viewer/js/babylon_js/babylon.js' %}"></script>
</head>

<body>
    <canvas id="renderCanvas"></canvas>

    <script>
        // Ottieni il canvas e crea l'engine
        var canvas = document.getElementById("renderCanvas");
        var engine = new BABYLON.Engine(canvas, true);

        // Crea la scena
        var scene = new BABYLON.Scene(engine);

        // Aggiungi camera orbitale
        var camera = new BABYLON.ArcRotateCamera("camera", Math.PI / 2, Math.PI / 4, 10, BABYLON.Vector3.Zero(), scene);
        camera.attachControl(canvas, true);

        // Aggiungi luce
        var light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

        // Aggiungi un cubo semplice
        var box = BABYLON.MeshBuilder.CreateBox("box", { size: 2 }, scene);

        // Render loop
        engine.runRenderLoop(function () {
            scene.render();
        });

        // Adatta l'engine alla finestra
        window.addEventListener("resize", function () {
            engine.resize();
        });

        // To remove is only for testing the request
        const response = fetch("/load-points/");
        console.log(response);
        response.then(res => res.json()).then(data => {
            console.log("Numero di punti:", data.points.length);
        });

    </script>
</body>

</html>
