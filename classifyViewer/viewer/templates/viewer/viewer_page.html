{% load static %}

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>3DOM Classify Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'viewer/css/styles.css' %}">
    <!-- Load BabylonJS from your app's static files -->
    <script src="{% static 'viewer/js/babylon_js/babylon.js' %}"></script>
    <script src="{% static 'viewer/js/babylon_js/materialsLibrary/babylonjs.materials.min.js' %}"></script>
    <script src="{% static 'viewer/js/babylon_js/loaders/babylonjs.loaders.min.js' %}"></script>
</head>

<body>
    <!-- Top Navbar -->
    <div class="top-navbar">
        <div class="navbar-left">
            <img src="{% static 'viewer/icons/3DClassyViewer_Logo.png' %}" alt="3DClassifyViewer Logo" class="nav-logo">
            <div class="menu-item-container" id="file-menu-container">
                <button class="nav-btn" id="nav-file-btn">
                    File <span style="font-size: 0.6rem; opacity: 0.7; margin-left: 6px;">▼</span>
                </button>
                <div id="file-dropdown" class="dropdown-content" style="top: 100%;">
                    <button class="dropdown-option" id="menu-load-data">Load Data</button>
                    <button class="dropdown-option" id="menu-download-data">Download Data</button>
                </div>
            </div>
        </div>

        <!-- Separator -->
        <div class="navbar-separator"></div>

        <!-- Layout Mode Buttons -->
        <div class="navbar-mode-group">
            <button class="nav-mode-btn active" id="nav-mode-training">Training</button>
            <button class="nav-mode-btn" id="nav-mode-classify">Classify</button>
        </div>

        <!-- Documentation Button -->
        <div class="navbar-right">
            <a href="/documentation/" target="_blank" class="nav-btn nav-doc-btn" style="text-decoration: none;">
                <img src="{% static 'viewer/icons/note.png' %}" alt="Docs icon">
                Documentation
            </a>
        </div>
    </div>


    <div class="app-container">
        <!-- Left Sidebar -->
        <aside id="sidebar-left" class="panel side-panel">
            <div class="panel-header">INSPECTOR</div>
            <div id="sidebar-left-content" class="panel-content">
                <!-- Accordion sections injected by JS -->
            </div>
        </aside>

        <!-- Resizer 1 -->
        <div class="resizer" id="resizer-left" data-direction="left"></div>

        <!-- Central Viewport -->
        <main id="central-viewport">
            <!-- Loading Overlay -->
            <div id="loading-overlay">
                <div class="spinner"></div>
                <div class="loading-text">Loading Point Cloud...</div>
            </div>

            <canvas id="renderCanvas"></canvas>
            <div id="top-left-controls" class="top-left-controls-container">
                <div id="view-menu" class="menu-item-container"></div>
                <div id="color-menu" class="menu-item-container"></div>
            </div>
            <div id="right-toolbar" class="toolbar-container">
                <!-- Buttons injected by JS -->
            </div>

            <!-- Feature Range Slider (Floating) -->
            <div id="feature-range-control" class="feature-range-container">
                <div class="feature-range-header">
                    <span id="feature-range-name" class="feature-name">Scalar Field</span>
                    <div class="feature-range-actions">
                        <div class="colormap-picker-container">
                            <button id="colormap-picker-btn" class="feature-range-reset" title="Change Colormap">
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <rect x="0" y="3" width="10" height="4" rx="2" fill="url(#cmPreview)" />
                                    <defs>
                                        <linearGradient id="cmPreview" x1="0" y1="0" x2="1" y2="0"
                                            gradientUnits="objectBoundingBox">
                                            <stop offset="0%" stop-color="#0000ff" />
                                            <stop offset="33%" stop-color="#00ff00" />
                                            <stop offset="66%" stop-color="#ffff00" />
                                            <stop offset="100%" stop-color="#ff0000" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </button>
                            <div id="colormap-dropdown" class="colormap-dropdown">
                                <button class="colormap-option active" data-colormap="0">
                                    <span class="colormap-label">Blue › Red</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #0000ff, #00ff00, #ffff00, #ff0000)"></span>
                                </button>
                                <button class="colormap-option" data-colormap="1">
                                    <span class="colormap-label">Viridis</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #440154, #31688e, #35b779, #fde725)"></span>
                                </button>
                                <button class="colormap-option" data-colormap="2">
                                    <span class="colormap-label">Jet</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000)"></span>
                                </button>
                                <button class="colormap-option" data-colormap="3">
                                    <span class="colormap-label">Diverging</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #2166ac, #f7f7f7, #d6604d)"></span>
                                </button>
                                <button class="colormap-option" data-colormap="4">
                                    <span class="colormap-label">Grayscale</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #000000, #ffffff)"></span>
                                </button>
                                <button class="colormap-option" data-colormap="5">
                                    <span class="colormap-label">Hot</span>
                                    <span class="colormap-swatch"
                                        style="background: linear-gradient(to right, #000000, #ff0000, #ffff00, #ffffff)"></span>
                                </button>
                            </div>
                        </div>
                        <button id="feature-range-reset" class="feature-range-reset" title="Reset Range"><img
                                src="{% static 'viewer/icons/refresh.png' %}" style="width: 10px; height: 10px;"
                                alt="Reset Range"></button>
                    </div>
                </div>
                <div class="dual-range-slider">
                    <div class="slider-track"></div>
                    <div id="range-highlight" class="range-highlight"></div>
                    <input type="range" id="range-min" class="range-input min-handle" min="0" max="100" value="0"
                        step="0.1">
                    <input type="range" id="range-max" class="range-input max-handle" min="0" max="100" value="100"
                        step="0.1">
                </div>
                <div class="range-values">
                    <span id="val-min" class="range-val">0.00</span>
                    <span id="val-max" class="range-val">1.00</span>
                </div>
            </div>

            <!-- Command Guide Overlay -->
            <div id="command-guide" class="command-guide">
                <!-- Navigation (Default Mode) -->
                <div id="guide-nav" class="guide-group">
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="mouse-icon left"></div>
                        </div>
                        <span class="command-label">Rotate</span>
                    </div>
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="mouse-icon right"></div>
                        </div>
                        <span class="command-label">Pan</span>
                    </div>
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="mouse-icon wheel"></div>
                        </div>
                        <span class="command-label">Zoom</span>
                    </div>
                </div>

                <!-- Selection (Rect/Lasso Mode) -->
                <div id="guide-selection" class="guide-group" style="display: none;">
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="mouse-icon left"></div>
                        </div>
                        <span class="command-label">Select</span>
                    </div>
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="command-key">CTRL</div>
                            <span class="command-separator">+</span>
                            <div class="mouse-icon left"></div>
                        </div>
                        <span class="command-label">Deselect</span>
                    </div>
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="command-key">I</div>
                        </div>
                        <span class="command-label">Invert Selection</span>
                    </div>
                    <div class="command-item">
                        <div class="command-key-container">
                            <div class="command-key">ESC</div>
                        </div>
                        <span class="command-label">Deselect All</span>
                    </div>
                </div>
            </div>

            <div id="scene-info-bar" class="info-bar-container">
                <div class="info-item">
                    <span class="info-label">POINTS:</span>
                    <span id="point-count" class="info-value">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">VISIBLE:</span>
                    <span id="visible-point-count" class="info-value">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">FPS:</span>
                    <span id="fps-counter" class="info-value">0</span>
                </div>
            </div>
        </main>

        <!-- Resizer 2 -->
        <div class="resizer" id="resizer-right" data-direction="right"></div>

        <!-- Right Inspector -->
        <aside id="sidebar-right" class="panel side-panel">
            <div class="panel-header">TOOLS</div>
            <div id="sidebar-right-content" class="panel-content">
                <!-- Accordion sections injected by JS -->
            </div>
        </aside>
    </div>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script type="module" src="{% static 'viewer/js/main.js' %}"></script>
</body>

</html>
